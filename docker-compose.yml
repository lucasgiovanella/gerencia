services:
  db:
    image: postgres:16-alpine
    container_name: gerencia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gerencia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gerencia_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gerencia_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
