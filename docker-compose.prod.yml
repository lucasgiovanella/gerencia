name: gerencia-prod

services:
  db:
    image: postgres:16-alpine
    container_name: gerencia_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: gerencia_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: redgate/flyway:10
    container_name: gerencia_migrate_prod
    command: -url=jdbc:postgresql://db:5432/gerencia_prod -user=postgres -password=postgres -connectRetries=60 migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: gerencia_app_prod
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gerencia_prod
      DB_USER: postgres
      DB_PASS: postgres
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata_prod:
