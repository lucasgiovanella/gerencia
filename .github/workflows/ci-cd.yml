name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # CI: Testes + Qualidade + Build
  # ─────────────────────────────────────────────
  ci:
    name: "Integração Contínua"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gerencia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: gerencia_test
      DB_USER: postgres
      DB_PASS: postgres
      NODE_ENV: test

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "Instalar dependências"
        run: bun install

      # ── Migrations no banco de teste ──
      - name: "Instalar Flyway CLI"
        run: |
          wget -qO- https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/10.15.0/flyway-commandline-10.15.0-linux-x64.tar.gz \
            | tar -xz -C /opt
          sudo ln -s /opt/flyway-10.15.0/flyway /usr/local/bin/flyway

      - name: "Rodar migrations no banco de teste"
        run: |
          flyway \
            -url="jdbc:postgresql://localhost:5432/gerencia_test" \
            -user=postgres \
            -password=postgres \
            -locations="filesystem:db/migrations" \
            migrate

      # ── Testes ──
      - name: "Executar testes automatizados"
        run: bun test --reporter junit > test-results.xml 2>&1 || true

      - name: "Exibir estatísticas dos testes"
        if: always()
        run: |
          echo "================================================"
          echo "           ESTATÍSTICAS DOS TESTES"
          echo "================================================"
          bun test 2>&1 | tail -20
          echo "================================================"

      # ── Qualidade de Código com Biome ──
      - name: "Análise de qualidade (Biome lint)"
        run: bunx biome lint src/

      - name: "Verificação de formatação (Biome format)"
        run: bunx biome format src/ --diagnostic-level=error

      # ── Build da imagem ──
      - name: "Build da imagem Docker"
        run: docker build -t gerencia-app:${{ github.sha }} .

      - name: "Upload dos resultados de teste"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: test-results.xml

  # ─────────────────────────────────────────────
  # Deploy Homologação (push em develop)
  # ─────────────────────────────────────────────
  deploy-homolog:
    name: "Deploy → Homologação"
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: "Deploy via SSH"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd ~/projeto
            git pull origin develop
            docker compose -f docker-compose.homolog.yml down --remove-orphans
            docker compose -f docker-compose.homolog.yml up -d --build
            echo "✅ Homologação atualizada — $(date)"

  # ─────────────────────────────────────────────
  # Deploy Produção (push em main)
  # ─────────────────────────────────────────────
  deploy-prod:
    name: "Deploy → Produção"
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "Deploy via SSH"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd ~/projeto
            git pull origin main
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build
            echo "✅ Produção atualizada — $(date)"
