<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gerência Financeira</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .login-box h1 {
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
      color: #111;
    }

    .login-box p {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.25rem;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #fafafa;
      margin-bottom: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #4f7df9;
    }

    button {
      width: 100%;
      padding: 0.6rem;
      background: #4f7df9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #3b6de0; }

    .error {
      background: #fde8e8;
      color: #c0392b;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>💰 Gerência Financeira</h1>
    <p>Faça login para continuar</p>

    <div class="error" id="error"></div>

    <form id="loginForm">
      <label for="login">Login</label>
      <input type="text" id="login" required autofocus />

      <label for="senha">Senha</label>
      <input type="password" id="senha" required />

      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById("error");
      errorEl.style.display = "none";

      const body = {
        login: document.getElementById("login").value,
        senha: document.getElementById("senha").value,
      };

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json();
          errorEl.textContent = data.error || "Erro ao fazer login";
          errorEl.style.display = "block";
          return;
        }

        window.location.href = "/app.html";
      } catch {
        errorEl.textContent = "Erro de conexão com o servidor";
        errorEl.style.display = "block";
      }
    });

    // Se já logado, redireciona
    fetch("/api/me").then(r => { if (r.ok) window.location.href = "/app.html"; });
  </script>
</body>
</html>
